name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm install
      - name: Check schema drift
        run: |
          npm run generate:schemas
          git diff --exit-code schema-server/public/var/v1/schema.json || \
            (echo "Schema drift detected: run npm run generate:schemas and commit" && exit 1)
      - name: Install schema-server deps
        run: npm --prefix schema-server install --no-package-lock
      - name: Typecheck schema-server
        run: npm --prefix schema-server run typecheck
      - run: npm run build
      - name: Lint
        run: npm run lint
      - run: npm test
      - run: npm run typecheck
